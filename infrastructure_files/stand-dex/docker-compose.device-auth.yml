# Device-auth overlay: builds and uses local management+dashboard images.
# Enables NETBIRD_DEV_INIT_TOKEN for automated API access without browser login.
# Enables NETBIRD_DEV_ENABLE_TLS=1 so management generates a self-signed cert and
# serves TLS on port 443 directly — required for real mTLS client-cert testing.
#
# Build images first:
#   make build-mgmt
#   make build-dashboard  (optional — uses upstream image if skipped)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.device-auth.yml up -d
#   make e2e

services:
  management:
    image: netbird/management:tpm-dev
    # Override Caddy config to proxy management using HTTPS backend (TLS mode)
    # and expose management TLS port directly for gRPC mTLS tests.
    environment:
      - NB_DISABLE_GEOLOCATION=true
      # Pre-create an admin service account with this PAT on first start.
      # Use in API calls: Authorization: Bearer <value below>
      - NETBIRD_DEV_INIT_TOKEN=nbp_ABCDEFGHIJKLMNOPQRSTUVWXYZabcd34KlM6
      # Enable TLS on the management server for real mTLS testing.
      # The entrypoint generates a self-signed cert and writes management-generated.json.
      - NETBIRD_DEV_ENABLE_TLS=1
    ports:
      # Direct management TLS port — bypasses Caddy, used by mtls-demo / enroll-demo for mTLS.
      - "8443:443"
    command:
      # Use the TLS config override generated by the entrypoint.
      - management
      - --config=/var/lib/netbird/management-generated.json
      - --datadir=/var/lib/netbird
      - --log-file=console
      - --log-level=info
      - --disable-anonymous-metrics
      - --single-account-mode-domain=netbird.localhost
    volumes:
      - management_data:/var/lib/netbird

  caddy:
    # Override Caddyfile to proxy management using HTTPS backend (management now speaks TLS).
    volumes:
      - ./Caddyfile.device-auth:/etc/caddy/Caddyfile

  dashboard:
    image: netbird/dashboard:tpm-dev

volumes:
  management_data:
