issuer: http://localhost:5556/dex

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

grpc:
  addr: 0.0.0.0:5557

oauth2:
  skipApprovalScreen: true
  responseTypes: ["code"]

staticClients:
  - id: netbird-dashboard
    name: NetBird Dashboard
    secret: netbird-dashboard-secret
    redirectURIs:
      - https://localhost/#callback
      - https://localhost/#silent-callback
      - https://localhost/nb-auth
      - https://localhost/nb-silent-auth

  - id: netbird-cli
    name: NetBird CLI
    public: true
    redirectURIs:
      - http://localhost:53000/
      - http://localhost:54000/

enablePasswordDB: true

# Admin credentials for UI login (dashboard at https://localhost):
#   Email:    admin@netbird.localhost
